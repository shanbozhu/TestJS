<!--JavaScript：改变 HTML 图像-->

<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>菜鸟教程(runoob.com)</title>
</head>
<body>

<script>
    function changeImage() {
        element = document.getElementById('myimage')
        if (element.src.match("1")) {
            element.src = "/images/2.png";
        } else {
            element.src = "/images/1.png";
        }
    }
</script>
<img id="myimage" onclick="changeImage()" src="/images/1.png" width="100" height="180">
<p>点击灯泡就可以打开或关闭这盏灯</p>

</body>
</html>
